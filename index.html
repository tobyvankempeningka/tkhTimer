<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
    height: 100%;
    margin: 0;
    background: #fff;
    font-family: Arial, sans-serif;
}

.container {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

.text {
    font-size: 20px;
    margin: 10px 0;
}

.timer {
    font-size: 80px;
    font-weight: bold;
    margin: 10px 0;
}
</style>
</head>

<body>
<div class="container">
    <p class="text">
        Geïnteresseerd geraakt in deze producten?<br>
        Nog
    </p>

    <div class="timer">
      <div class="timer" id="days"></div>
      <div class="timer" id="hours"></div>
      <div class="timer" id="minutes"></div>
      <div class="timer" id="seconds"></div>
    </div>
    <div id="timer"></div>

    <p class="text">
        tot je deze producten kan kopen in onze Tweedekanshoek!
    </p>
</div>

<script>
const targetDate = new Date("2026-09-04T00:00:00").getTime();
const timer = document.getElementById("timer");
const daysDiv = document.getElementById("days");
const hoursDiv = document.getElementById("hours");
const minutesDiv = document.getElementById("minutes");
const secondsDiv = document.getElementById("seconds");

function updateTimer() {
    const distance = targetDate - Date.now();

    if (distance <= 0) {
        timer.textContent = "EXPIRED";
        return;
    }

    const days = Math.floor(distance / 86400000);
    const hours = Math.floor(distance % 86400000 / 3600000);
    const minutes = Math.floor(distance % 3600000 / 60000);
    const seconds = Math.floor(distance % 60000 / 1000);

    timer.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    daysDiv.textContent = `${days}d`;
    hoursDiv.textContent = `${hours}h`;
    minutesDiv.textContent = `${minutes}m`;
    secondsDiv.textContent = `${seconds}s`;
}

updateTimer();
setInterval(updateTimer, 1000);
</script>
</body>
</html>
