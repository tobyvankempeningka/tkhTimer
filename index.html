<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://www.ikea.com/global/assets/fonts/nl/fonts.12ac7b60.css">

<style>
html, body {
    height: 100%;
    margin: 0;
    background: #fff;
    font-family: Arial, sans-serif;
}

.container {
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 100px;
    box-sizing: border-box;
}

.text {
  display:block;
  width:100%;
  font-family:"Noto IKEA";
  font-size: 60px;
  margin: 10px 0;
}

.digits{
    margin:10px 0;
    display:flex;
    flex-direction:row;
}

.digitCon{
  text-align:center;
  width:25%;
  display:block;
  padding:20px;
}

.digit {
    font-size: 80px;
    font-family:"Noto IKEA";
    font-weight:700;
    font-style:normal;
}
.digitText{
  display:block;
  margin:0;
  font-size:40px;
  font-family:"Noto IKEA";
  font-weight:400;
  font-style:normal;
}
.bold{
  font-family:"Noto IKEA";
  font-weight:700;
  font-style:normal;
}
</style>
</head>

<body>
<div class="container">
    <p class="text">
        Ben je geïnspireerd geraakt<br>door deze kamer en wil je deze<br>producten een tweede kans geven?<br><br>
        Nog
    </p>

    <div class="digits">
      <div class="digitCon"><div class="digit" id="days"></div><p class="digitText">dagen</p></div>
      <div class="digitCon"><div class="digit" id="hours"></div><p class="digitText">uur</p></div>
      <div class="digitCon"><div class="digit" id="minutes"></div><p class="digitText">minuten</p></div>
      <div class="digitCon"><div class="digit" id="seconds"></div><p class="digitText">seconden</p></div>
    </div>
    <div id="timer"></div>

    <p class="text">
        tot je deze producten op<br><span class="bold" id="targetDateTextDiv"></span>kan vinden bij de<br><span class="bold">Tweedekanshoek</span>!
    </p>
</div>

<script>

const countTil = new Date("2026-09-04T00:00:00").getTime();

const targetDate = countTil;
const targetDateText = new Date(countTil);

const dateDay = String(targetDateText.getDate()).padStart(2,'0');
const dateMonth = String(targetDateText.getMonth() + 1).padStart(2,'0');
const dateYear = targetDateText.getFullYear();
const targetDateTextformatted = `${dateDay}-${dateMonth}-${dateYear}`;

const timer = document.getElementById("timer");
const daysDiv = document.getElementById("days");
const hoursDiv = document.getElementById("hours");
const minutesDiv = document.getElementById("minutes");
const secondsDiv = document.getElementById("seconds");

const targetDateTextDiv = document.getElementById("targetDateTextDiv");

function updateTimer() {
    const distance = targetDate - Date.now();

    if (distance <= 0) {
        timer.textContent = "EXPIRED";
        return;
    }

    const days = Math.floor(distance / 86400000);
    const hours = Math.floor(distance % 86400000 / 3600000);
    const minutes = Math.floor(distance % 3600000 / 60000);
    const seconds = Math.floor(distance % 60000 / 1000);

    //timer.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
    daysDiv.textContent = `${days}`;
    hoursDiv.textContent = `${hours}`;
    minutesDiv.textContent = `${minutes}`;
    secondsDiv.textContent = `${seconds}`;
    targetDateTextDiv.textContent = `${targetDateTextformatted} `;

}

updateTimer();
setInterval(updateTimer, 1000);
</script>
</body>
</html>
